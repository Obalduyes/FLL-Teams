<script>
const statusValue = document.getElementById("statusValue");
const updatedValue = document.getElementById("updatedValue");
const searchInput = document.getElementById("searchInput");
const tableBody = document.getElementById("tableBody");
const countValueInner = document.getElementById("countValueInner");
const fallback = document.getElementById("fallback");
const fileInput = document.getElementById("fileInput");
const reloadFromFileBtn = document.getElementById("reloadFromFileBtn");

let teams = [];
let lastTeamsTextHash = "";
let searchQuery = "";
const MAX_SCORE = 545;

function formatRun(value) {
  return Number.isFinite(Number(value)) ? `${value}/${MAX_SCORE}` : "—";
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeTeams(jsonData) {
  if (!Array.isArray(jsonData)) return [];
  const normalized = [];
  for (const item of jsonData) {
    if (!item || typeof item !== "object") continue;
    const name = String(item.name ?? "").trim();
    const room = String(item.room ?? "").trim();
    const run1 = Number(item.run1 ?? NaN);
    const run2 = Number(item.run2 ?? NaN);
    const run3 = Number(item.run3 ?? NaN);
    if (!name || (!Number.isFinite(run1) && !Number.isFinite(run2) && !Number.isFinite(run3))) continue;
    normalized.push({ name, room, run1, run2, run3 });
  }
  return normalized;
}

function renderTable() {
  // Фильтрация по поиску
  const q = searchQuery.trim().toLowerCase();
  const filtered = !q ? teams : teams.filter(t => t.name.toLowerCase().includes(q));

  // Обновляем счётчик найденных команд
  countValueInner.textContent = String(filtered.length);

  // Очищаем таблицу
  tableBody.innerHTML = "";

  if (filtered.length === 0) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td colspan="6" style="text-align:center; color: rgba(237,237,237,0.65); padding: 18px 14px;">Ничего не найдено.</td>`;
    tableBody.appendChild(tr);
    return;
  }

  // Отображаем все команды
  filtered.forEach(team => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>—</td>
      <td>${escapeHtml(team.name)}</td>
      <td>${formatRun(team.run1)}</td>
      <td>${formatRun(team.run2)}</td>
      <td>${formatRun(team.run3)}</td>
      <td>${escapeHtml(team.room)}</td>
    `;
    tableBody.appendChild(tr);
  });
}

// Загрузка JSON
async function tryLoadTeamsFromFetch() {
  const cacheBustedUrl = "./teams.json?t=" + Date.now();
  const response = await fetch(cacheBustedUrl, { cache: "no-store" });
  if (!response.ok) throw new Error("HTTP " + response.status);
  const text = await response.text();
  const nextHash = hashText(text);
  if (nextHash === lastTeamsTextHash) return;
  const parsed = JSON.parse(text);
  teams = normalizeTeams(parsed);
  lastTeamsTextHash = nextHash;
  statusValue.textContent = "Обновлено";
  updatedValue.textContent = new Date().toLocaleString();
  renderTable();
}

function hashText(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0).toString(16);
}

function startPolling() {
  (async () => {
    try { await tryLoadTeamsFromFetch(); statusValue.textContent = "Готово"; }
    catch { statusValue.textContent = "Не могу загрузить json"; fallback.classList.add("visible"); }
  })();
  setInterval(async () => {
    try { await tryLoadTeamsFromFetch(); fallback.classList.remove("visible"); } catch {}
  }, 5000);
}

async function loadTeamsFromFile(file) {
  const text = await file.text();
  const parsed = JSON.parse(text);
  teams = normalizeTeams(parsed);
  lastTeamsTextHash = hashText(text);
  statusValue.textContent = "Загружено вручную";
  updatedValue.textContent = new Date().toLocaleString();
  renderTable();
}

reloadFromFileBtn.addEventListener("click", async () => {
  const file = fileInput.files && fileInput.files[0];
  if (!file) { statusValue.textContent = "Выберите файл json"; return; }
  try { await loadTeamsFromFile(file); } catch { statusValue.textContent = "Ошибка JSON формата"; }
});

searchInput.addEventListener("input", (e) => { searchQuery = e.target.value || ""; renderTable(); });

renderTable();
startPolling();
</script>
